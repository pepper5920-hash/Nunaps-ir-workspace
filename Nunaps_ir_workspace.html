<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nunaps IR 2025 Workspace</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg0:#06080F;--bg1:#0C1220;--bg2:#111827;--bg3:#162032;--bgInput:#0D1525;
  --bd:rgba(148,163,184,.07);--bdFocus:rgba(8,145,178,.4);
  --t1:#F1F5F9;--t2:#94A3B8;--t3:#64748B;--t4:#475569;
  --teal:#0891B2;--tealL:#22D3EE;--tealG:rgba(8,145,178,.15);
  --green:#10B981;--amber:#F59E0B;--red:#EF4444;
  --r:12px;--rs:8px;
  --font:'Noto Sans KR',-apple-system,BlinkMacSystemFont,sans-serif;
  --mono:'JetBrains Mono',monospace;
}
html,body{height:100%;overflow:hidden}
body{font-family:var(--font);background:var(--bg0);color:var(--t1)}
.app{display:flex;height:100vh;overflow:hidden}

/* Sidebar */
.sidebar{
  width:276px;background:linear-gradient(180deg,var(--bg1),var(--bg0));
  border-right:1px solid var(--bd);display:flex;flex-direction:column;flex-shrink:0;
  transition:width .3s cubic-bezier(.4,0,.2,1);z-index:10;
}
.sidebar.collapsed{width:0;overflow:hidden;border:none}
.sidebar-hdr{padding:20px 16px 14px;border-bottom:1px solid var(--bd)}
.logo-row{display:flex;align-items:center;gap:11px}
.logo-icon{
  width:38px;height:38px;border-radius:10px;
  background:linear-gradient(135deg,#0891B2,#06B6D4);
  display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0;
  box-shadow:0 4px 14px rgba(8,145,178,.25);
}
.logo-t1{font-size:13px;font-weight:700;color:var(--t1);letter-spacing:-.3px}
.logo-t2{font-size:9.5px;color:var(--t3);margin-top:2px;letter-spacing:.3px}

.progress-bar-wrap{margin-top:14px}
.progress-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.progress-label{font-size:9.5px;color:var(--t3);text-transform:uppercase;letter-spacing:1px}
.progress-pct{font-size:11px;font-weight:600}
.progress-track{height:3px;background:#1E293B;border-radius:2px;overflow:hidden}
.progress-fill{height:100%;border-radius:2px;transition:width .5s ease}

.slide-list{flex:1;overflow-y:auto;padding:6px 0}
.slide-list::-webkit-scrollbar{width:4px}
.slide-list::-webkit-scrollbar-thumb{background:#1E293B;border-radius:2px}

.slide-item{
  padding:9px 16px;cursor:pointer;display:flex;align-items:center;gap:10px;
  border-left:3px solid transparent;transition:all .15s ease;
}
.slide-item:hover{background:rgba(8,145,178,.06)}
.slide-item.active{background:rgba(8,145,178,.1);border-left-color:var(--teal)}
.slide-num{
  width:26px;height:26px;border-radius:7px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:600;background:rgba(30,41,59,.8);color:var(--t3);
}
.slide-item.active .slide-num{background:rgba(8,145,178,.2);color:var(--tealL)}
.slide-item.done .slide-num{background:rgba(16,185,129,.12);color:var(--green)}
.slide-info{flex:1;min-width:0}
.slide-name{font-size:11.5px;font-weight:400;color:var(--t2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.slide-item.active .slide-name{font-weight:600;color:var(--t1)}
.slide-dept-tag{
  font-size:8.5px;font-weight:600;margin-top:3px;
  padding:2px 6px;border-radius:4px;display:inline-block;
}
.slide-prog{display:flex;align-items:center;gap:5px;margin-top:4px}
.slide-prog-track{flex:1;height:2px;background:#1E293B;border-radius:1px;overflow:hidden}
.slide-prog-fill{height:100%;border-radius:1px;transition:width .3s}
.slide-prog-pct{font-size:8.5px;color:var(--t3);flex-shrink:0}

.sidebar-footer{padding:10px 16px;border-top:1px solid var(--bd);font-size:10px;color:var(--t3)}

/* Main */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}

.topbar{
  padding:14px 28px;border-bottom:1px solid var(--bd);
  background:rgba(12,18,32,.7);backdrop-filter:blur(12px);
  display:flex;align-items:center;justify-content:space-between;
}
.topbar-left{display:flex;align-items:center;gap:14px}
.nav-btn{
  width:30px;height:30px;border-radius:var(--rs);
  border:1px solid rgba(148,163,184,.12);background:transparent;
  color:var(--t2);cursor:pointer;font-size:13px;
  display:flex;align-items:center;justify-content:center;
  transition:all .15s;
}
.nav-btn:hover{background:rgba(148,163,184,.06);color:var(--t1)}
.nav-btn:disabled{color:var(--t4);cursor:default;opacity:.4}
.topbar-section{font-size:9.5px;color:var(--teal);text-transform:uppercase;letter-spacing:1.5px;font-weight:600}
.topbar-title{font-size:19px;font-weight:700;color:var(--t1);letter-spacing:-.5px;margin-top:1px}
.topbar-right{display:flex;align-items:center;gap:10px}
.topbar-count{font-size:11px;color:var(--t3)}
.menu-btn{
  display:none;width:36px;height:36px;border-radius:var(--rs);
  border:1px solid rgba(148,163,184,.12);background:transparent;
  color:var(--t2);cursor:pointer;font-size:18px;
  align-items:center;justify-content:center;
}

.content{flex:1;overflow-y:auto;padding:24px 28px}
.content::-webkit-scrollbar{width:5px}
.content::-webkit-scrollbar-thumb{background:#1E293B;border-radius:3px}

/* Slide Header Card */
.slide-header{
  background:linear-gradient(135deg,#0F172A,#1E293B);
  border-radius:14px;padding:26px 28px;margin-bottom:24px;
  border:1px solid rgba(8,145,178,.12);position:relative;overflow:hidden;
}
.slide-header::before{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,#0891B2,#06B6D4,#22D3EE);
}
.sh-section{font-size:10px;color:var(--teal);text-transform:uppercase;letter-spacing:2px;font-weight:600;margin-bottom:7px}
.sh-title{font-size:22px;font-weight:700;color:var(--t1);letter-spacing:-.5px;margin-bottom:5px}
.sh-subtitle{font-size:12.5px;color:var(--t2);line-height:1.5}
.sh-dept{
  display:inline-flex;align-items:center;gap:6px;margin-top:14px;
  padding:6px 12px;border-radius:var(--rs);font-size:11px;font-weight:600;
}

/* Cover extras */
.cover-box{
  margin-top:20px;padding:16px 20px;
  background:rgba(8,145,178,.06);border-radius:10px;
  border:1px solid rgba(8,145,178,.12);
}
.cover-box-title{font-size:12px;color:var(--tealL);font-weight:600;margin-bottom:5px}
.cover-box-text{font-size:12px;color:var(--t2);line-height:1.6}

/* Field cards */
.field-card{
  margin-bottom:16px;background:rgba(15,23,42,.55);border-radius:var(--r);
  border:1px solid var(--bd);overflow:hidden;transition:border-color .25s;
}
.field-card.editing{border-color:var(--bdFocus)}
.field-card.filled{border-color:rgba(16,185,129,.12)}
.field-hdr{
  padding:12px 18px;display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid rgba(148,163,184,.04);
}
.field-hdr-left{display:flex;align-items:center;gap:9px}
.field-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.field-label{font-size:13px;font-weight:600;color:var(--t1)}
.field-dept{
  padding:3px 9px;border-radius:5px;font-size:9.5px;font-weight:600;letter-spacing:-.1px;
}
.field-input{padding:3px 3px}
.field-input textarea{
  width:100%;padding:10px 15px;background:transparent;border:none;outline:none;
  resize:vertical;font-size:12.5px;line-height:1.7;color:#CBD5E1;
  font-family:var(--font);min-height:100px;
}
.field-input textarea::placeholder{color:var(--t4);font-size:12px}

/* Dept summary grid */
.dept-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px;
  margin-top:16px;
}
.dept-card{
  padding:12px 14px;border-radius:10px;background:rgba(30,41,59,.4);
  border:1px solid rgba(148,163,184,.05);
}
.dept-card-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px}
.dept-card-name{font-size:11px;font-weight:600}
.dept-card-count{font-size:10px;color:var(--t2);font-weight:600}

/* Nav footer */
.content-nav{
  display:flex;justify-content:space-between;margin-top:28px;padding-bottom:28px;
}
.btn-prev,.btn-next{
  padding:9px 18px;border-radius:var(--rs);font-size:11.5px;font-weight:500;
  cursor:pointer;transition:all .15s;border:none;font-family:var(--font);
}
.btn-prev{
  background:rgba(30,41,59,.7);border:1px solid rgba(148,163,184,.08);color:var(--t2);
}
.btn-prev:hover{background:rgba(30,41,59,1);color:var(--t1)}
.btn-prev:disabled{opacity:.3;cursor:default}
.btn-next{
  background:linear-gradient(135deg,#0891B2,#0E7490);color:#fff;font-weight:600;
}
.btn-next:hover{filter:brightness(1.1)}
.btn-next:disabled{opacity:.3;cursor:default;filter:none}

/* Setup overlay */
.setup-overlay{
  position:fixed;inset:0;background:rgba(6,8,15,.92);backdrop-filter:blur(20px);
  z-index:100;display:flex;align-items:center;justify-content:center;
}
.setup-box{
  background:var(--bg2);border:1px solid var(--bd);border-radius:16px;
  padding:36px 40px;max-width:520px;width:90%;
}
.setup-title{font-size:20px;font-weight:700;margin-bottom:6px}
.setup-desc{font-size:12.5px;color:var(--t2);line-height:1.6;margin-bottom:24px}
.setup-label{font-size:11px;color:var(--t3);font-weight:600;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.setup-input{
  width:100%;padding:10px 14px;background:var(--bgInput);border:1px solid var(--bd);
  border-radius:var(--rs);color:var(--t1);font-size:13px;font-family:var(--mono);
  outline:none;transition:border-color .2s;
}
.setup-input:focus{border-color:var(--bdFocus)}
.setup-input::placeholder{color:var(--t4)}
.setup-hint{font-size:10.5px;color:var(--t3);margin-top:6px;line-height:1.5}
.setup-btn{
  margin-top:20px;width:100%;padding:12px;border:none;border-radius:var(--rs);
  background:linear-gradient(135deg,#0891B2,#0E7490);color:#fff;
  font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font);
  transition:filter .15s;
}
.setup-btn:hover{filter:brightness(1.1)}
.setup-btn:disabled{opacity:.5;cursor:default;filter:none}
.setup-skip{
  margin-top:12px;text-align:center;font-size:11px;color:var(--t3);cursor:pointer;
}
.setup-skip:hover{color:var(--t2)}

/* Filter bar */
.filter-bar{
  display:flex;gap:6px;flex-wrap:wrap;padding:10px 16px;
  border-bottom:1px solid var(--bd);
}
.filter-chip{
  padding:4px 10px;border-radius:6px;font-size:10px;font-weight:600;
  cursor:pointer;border:1px solid var(--bd);background:transparent;
  color:var(--t3);transition:all .15s;font-family:var(--font);
}
.filter-chip.active{border-color:var(--teal);color:var(--tealL);background:var(--tealG)}
.filter-chip:hover{border-color:rgba(148,163,184,.2);color:var(--t2)}

/* Responsive */
@media(max-width:768px){
  .sidebar{position:fixed;left:0;top:0;bottom:0;width:280px!important;
    transform:translateX(-100%);transition:transform .3s ease;z-index:20}
  .sidebar.open{transform:translateX(0)}
  .sidebar.collapsed{transform:translateX(-100%)}
  .menu-btn{display:flex}
  .topbar{padding:12px 16px}
  .content{padding:16px}
  .slide-header{padding:20px}
  .dept-grid{grid-template-columns:1fr}
}

/* Backdrop for mobile menu */
.mobile-backdrop{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:15;
}
.mobile-backdrop.show{display:block}
</style>
</head>
<body>

<div class="app" id="app"></div>

<script>
// =====================================================
// DATA: Slides & Department Config
// =====================================================
const DEPTS = {
  '경영관리부': { bg:'#EDE9FE', text:'#6D28D9', dot:'#8B5CF6' },
  '해외사업부': { bg:'#DBEAFE', text:'#1D4ED8', dot:'#3B82F6' },

};

const SLIDES = [
  { id:'p0', title:'표지', section:'Prologue', subtitle:'뉴냅스 (Nunaps) IR 2025', dept:[], fields:[], cover:true },
  { id:'p1', title:'Company Overview', section:'회사 소개', subtitle:'AI와 신경가소성 기술을 결합한 디지털치료제 기업', dept:['경영관리부'], fields:[
    { key:'p1_company_info', label:'회사 개황', placeholder:'설립연월, 직원수, 자본금, 본사위치, 홈페이지, MISSION/VISION 등' },
    { key:'p1_business_areas', label:'주요 사업 분야', placeholder:'디지털치료제(DTx): 비비드브레인 등 / 웰니스: 뉴냅비전 등 / 혁신의료기기 3종 상세' },
  ]},

    { key:'p2_market', label:'시장성', placeholder:'미충족 의료 수요 분야, 파이프라인 확장성 — 시장 규모 데이터' },
    { key:'p2_biz', label:'사업성', placeholder:'독일 DiGA 등 글로벌 시장 진출 준비, 혁신의료기기 등록, 국내 병원 처방 수 등' },
  ]},
  { id:'p3', title:'Leadership Team', section:'핵심인력', subtitle:'각 분야 전문가로 구성된 핵심인력', dept:['경영관리부'], fields:[
    { key:'p3_ceo', label:'대표이사 프로필', placeholder:'학력, 주요경력, 논문, 특허, 수상 등' },
    { key:'p3_clevel', label:'C-Level 프로필', placeholder:'CTO, CQRO, CBO 등 각 임원 학력, 주요경력 2~3줄씩' },
    { key:'p3_advisory', label:'Advisory Group', placeholder:'의료진/교수진, 협력 병원/기업, 주요 자문위원 명단' },

  { id:'p4', title:'Market Opportunity', section:'시장 기회', subtitle:'글로벌 디지털 치료 시장 성장 현황', dept:['해외사업부','국내사업부','연구부'], fields:[
    { key:'p4_tam', label:'시장 규모 (TAM/SAM/SOM)', placeholder:'글로벌 vs 국내 시장 규모, CAGR, 출처(Grand View, Mordor Intelligence 등)' },
    { key:'p4_drivers', label:'시장 확대 배경', placeholder:'디지털치료제 시장 확대 배경, 성장 드라이버' },
    { key:'p4_chart', label:'차트용 데이터', placeholder:'연도별 시장 규모 추이 (차트 제작용 원본 데이터)' },
  ]},
  { id:'p5', title:'Industry & Trends', section:'산업 및 트렌드', subtitle:'디지털 치료와 AI 기술 발전', dept:['해외사업부','국내사업부'], fields:[

    { key:'p5_paradigm', label:'의료 패러다임 변화', placeholder:'과거(경구약, 주사) → 현재(AI 기반 진단/전자약) 전환 설명' },

  { id:'p7', title:'Nunaps Solution', section:'솔루션', subtitle:'우리는 눈이 아닌 \'뇌\'를 치료합니다', dept:['해외사업부'], fields:[

    { key:'p7_images', label:'필요 이미지 목록', placeholder:'DTI 이미지, fMRI 비교, 제품 사용 이미지 등 시각자료 목록' },
  ]},
  { id:'p8', title:'Technology (1/2)', section:'기술 경쟁력', subtitle:'AI 기반 시각 재활 디지털 치료 플랫폼', dept:['연구부'], fields:[
    { key:'p8_arch', label:'기술 아키텍처', placeholder:'AI 알고리즘 아키텍처/개념도, 환자 맞춤 치료 프로세스, 데이터 분석 파이프라인' },
    { key:'p8_diff', label:'기술 차별화 포인트', placeholder:'핵심 기술 차별화 vs 경쟁사, 기술 확장성(타 질환 적용)' },
  ]},
  { id:'p9', title:'Technology (2/2)', section:'임상 & 학술', subtitle:'식약처 임상을 통한 치료효과 검증', dept:['임상인허가부'], fields:[
    { key:'p9_clinical', label:'임상 결과 데이터', placeholder:'탐색/확증 임상 결과, 6개 유효성 평가변수, 차트/그래프 데이터' },
    { key:'p9_pub', label:'학술 논문 & 특허', placeholder:'JAMA Network Open 논문, SCI 목록, 특허 현황(국내외)' },

  { id:'p10', title:'Product Pipeline', section:'파이프라인', subtitle:'디지털치료제, AI, 웰니스 제품 개발 및 상용화', dept:['연구부'], fields:[

// =====================================================
// STATE
// =====================================================
let state = {
  activeSlide: 0,
  data: {},
  apiUrl: 'https://script.google.com/macros/s/AKfycbynimP2lFGaGm_qc5-cs4bzLwIjHLMd3I0R0nObxgIhZMMPYrhXDHCWZYjYZsD9ecp2_w/exec',
  connected: false,
  saving: false,
  lastSaved: null,
  sidebarOpen: false,
  showSetup: false,
  filterDept: null,
  loading: true,
};

// =====================================================
// API (Google Sheets via Apps Script)
// =====================================================
async function apiLoad() {
  try {
    const r = await fetch(state.apiUrl + '?action=load');
    if (!r.ok) throw new Error('Load failed');
    const json = await r.json();
    if (json.data) state.data = json.data;
    state.connected = true;
  } catch(e) {
    console.warn('API load failed, using local:', e);
    const local = localStorage.getItem('nunaps_ir_data');
    if (local) state.data = JSON.parse(local);
  }
  state.loading = false;
}

let saveTimer = null;
function scheduleSave() {
  if (saveTimer) clearTimeout(saveTimer);
  saveTimer = setTimeout(doSave, 1500);
}

async function doSave() {
  localStorage.setItem('nunaps_ir_data', JSON.stringify(state.data));
  state.saving = true;
  render();
  try {
    await fetch(state.apiUrl, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({ action: 'save', data: state.data }),
    });
    state.connected = true;
    state.lastSaved = new Date();
  } catch(e) {
    console.warn('API save failed:', e);
    state.lastSaved = new Date();
  }
  state.saving = false;
  render();
}

// Auto-refresh from server every 30s
setInterval(async () => {
  if (!state.connected) return;
  try {
    const r = await fetch(state.apiUrl + '?action=load');
    const json = await r.json();
    if (json.data) {
      // Merge: server wins for fields we haven't touched recently
      state.data = { ...state.data, ...json.data };
      render();
    }
  } catch(e) {}
}, 30000);

// =====================================================
// HELPERS
// =====================================================
function getProgress() {
  const total = SLIDES.reduce((s,sl) => s + sl.fields.length, 0);
  const filled = SLIDES.reduce((s,sl) => s + sl.fields.filter(f => state.data[f.key]?.trim()).length, 0);
  return total ? Math.round(filled/total*100) : 0;
}

function getSlideProgress(sl) {
  if (!sl.fields.length) return 100;
  const f = sl.fields.filter(f => state.data[f.key]?.trim()).length;
  return Math.round(f/sl.fields.length*100);
}

function getDeptSummary() {
  const s = {};
  SLIDES.forEach(sl => {
    sl.fields.forEach(f => {
      sl.dept.forEach(d => {
        if (!s[d]) s[d] = {total:0, filled:0};
        s[d].total++;
        if (state.data[f.key]?.trim()) s[d].filled++;
      });
    });
  });
  return s;
}

function h(tag, attrs, ...children) {
  const el = document.createElement(tag);
  if (attrs) Object.entries(attrs).forEach(([k,v]) => {
    if (k === 'className') el.className = v;
    else if (k === 'style' && typeof v === 'object') Object.assign(el.style, v);
    else if (k.startsWith('on')) el.addEventListener(k.slice(2).toLowerCase(), v);
    else if (k === 'innerHTML') el.innerHTML = v;
    else if (k === 'disabled') { if(v) el.setAttribute('disabled',''); }
    else if (k === 'placeholder') el.placeholder = v;
    else if (k === 'value') el.value = v;
    else if (k === 'rows') el.rows = v;
    else el.setAttribute(k, v);
  });
  children.flat().forEach(c => {
    if (c == null) return;
    if (typeof c === 'string') el.appendChild(document.createTextNode(c));
    else el.appendChild(c);
  });
  return el;
}

// =====================================================
// RENDER
// =====================================================
function render() {
  const app = document.getElementById('app');
  app.innerHTML = '';

  if (state.loading) {
    app.appendChild(h('div', {style:{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',flexDirection:'column',gap:'12px'}},
      h('div',{style:{fontSize:'40px'}},'🧠'),
      h('div',{style:{fontSize:'12px',color:'#64748B',letterSpacing:'2px'}},'LOADING...')
    ));
    return;
  }

  // Main app
  const layout = h('div',{className:'app'});

  // Mobile backdrop
  const backdrop = h('div',{className:'mobile-backdrop'+(state.sidebarOpen?' show':''), onClick:()=>{state.sidebarOpen=false;render()}});
  layout.appendChild(backdrop);

  layout.appendChild(renderSidebar());
  layout.appendChild(renderMain());
  app.appendChild(layout);
}

function renderSidebar() {
  const sb = h('div',{className:'sidebar'+(state.sidebarOpen?' open':'')});

  // Header
  const hdr = h('div',{className:'sidebar-hdr'});
  const logoRow = h('div',{className:'logo-row', style:{cursor:'pointer'}, onClick:()=>{state.sidebarOpen=false;render()}});
  logoRow.appendChild(h('div',{className:'logo-icon'},'🧠'));
  const logoText = h('div',{});
  logoText.appendChild(h('div',{className:'logo-t1'},'NUNAPS IR 2025'));
  logoText.appendChild(h('div',{className:'logo-t2'},'Collaboration Workspace'));
  logoRow.appendChild(logoText);
  hdr.appendChild(logoRow);

  // Progress
  const prog = getProgress();
  const pw = h('div',{className:'progress-bar-wrap'});
  const pm = h('div',{className:'progress-meta'});
  pm.appendChild(h('span',{className:'progress-label'},'전체 진행률'));
  pm.appendChild(h('span',{className:'progress-pct',style:{color:prog===100?'#10B981':'#F59E0B'}},prog+'%'));
  pw.appendChild(pm);
  const pt = h('div',{className:'progress-track'});
  pt.appendChild(h('div',{className:'progress-fill',style:{width:prog+'%',background:prog===100?'linear-gradient(90deg,#10B981,#34D399)':'linear-gradient(90deg,#F59E0B,#FBBF24)'}}));
  pw.appendChild(pt);
  hdr.appendChild(pw);
  sb.appendChild(hdr);

  // Dept filter
  const fb = h('div',{className:'filter-bar'});
  const allChip = h('button',{className:'filter-chip'+(state.filterDept===null?' active':''), onClick:()=>{state.filterDept=null;render()}},'전체');
  fb.appendChild(allChip);
  Object.keys(DEPTS).forEach(d => {
    fb.appendChild(h('button',{className:'filter-chip'+(state.filterDept===d?' active':''), onClick:()=>{state.filterDept=d;render()}}, d.replace('부','')));
  });
  sb.appendChild(fb);

  // Slide list
  const list = h('div',{className:'slide-list'});
  SLIDES.forEach((sl,i) => {
    if (state.filterDept && !sl.dept.includes(state.filterDept) && !sl.cover) return;

    const sp = getSlideProgress(sl);
    const isActive = i === state.activeSlide;
    const item = h('div',{
      className:'slide-item'+(isActive?' active':'')+(sp===100?' done':''),
      onClick:()=>{state.activeSlide=i;state.sidebarOpen=false;render()}
    });

    item.appendChild(h('div',{className:'slide-num'}, sp===100?'✓':String(i)));

    const info = h('div',{className:'slide-info'});
    info.appendChild(h('div',{className:'slide-name'},sl.title));

    if (sl.dept.length > 0) {
      const dc = deptColor(sl.dept[0]);
      const tag = h('span',{className:'slide-dept-tag',style:{background:dc.bg,color:dc.text}},sl.dept.join(', '));
      info.appendChild(tag);
    }

    if (sl.fields.length > 0) {
      const spDiv = h('div',{className:'slide-prog'});
      const spTrack = h('div',{className:'slide-prog-track'});
      spTrack.appendChild(h('div',{className:'slide-prog-fill',style:{width:sp+'%',background:sp===100?'#10B981':'#0891B2'}}));
      spDiv.appendChild(spTrack);
      spDiv.appendChild(h('span',{className:'slide-prog-pct'},sp+'%'));
      info.appendChild(spDiv);
    }

    item.appendChild(info);
    list.appendChild(item);
  });
  sb.appendChild(list);

  // Footer
  const footer = h('div',{className:'sidebar-footer'});
  if (state.saving) footer.textContent = '⏳ 저장 중...';
  else if (state.lastSaved) footer.textContent = '✅ ' + state.lastSaved.toLocaleTimeString('ko-KR') + ' 저장됨';
  else footer.textContent = '입력 시 자동 저장됩니다';

  const settingsLink = h('div',{style:{marginTop:'6px',fontSize:'10px',color:state.connected?'#10B981':'#64748B'}},
    (state.connected ? '🟢 서버 연결됨' : '🔴 로컬 저장 중')
  );
  footer.appendChild(settingsLink);
  sb.appendChild(footer);

  return sb;
}

function renderMain() {
  const main = h('div',{className:'main'});
  const sl = SLIDES[state.activeSlide];

  // Topbar
  const topbar = h('div',{className:'topbar'});
  const topL = h('div',{className:'topbar-left'});

  const menuBtn = h('button',{className:'menu-btn', onClick:()=>{state.sidebarOpen=!state.sidebarOpen;render()}},'☰');
  topL.appendChild(menuBtn);

  topL.appendChild(h('button',{className:'nav-btn',disabled:state.activeSlide===0,onClick:()=>{state.activeSlide--;render()}},'←'));
  const topInfo = h('div',{});
  topInfo.appendChild(h('div',{className:'topbar-section'},'Slide '+state.activeSlide+' — '+sl.section));
  topInfo.appendChild(h('div',{className:'topbar-title'},sl.title));
  topL.appendChild(topInfo);
  topL.appendChild(h('button',{className:'nav-btn',disabled:state.activeSlide===SLIDES.length-1,onClick:()=>{state.activeSlide++;render()}},'→'));

  const topR = h('div',{className:'topbar-right'});
  const filled = sl.fields.filter(f=>state.data[f.key]?.trim()).length;
  topR.appendChild(h('div',{className:'topbar-count'},filled+'/'+sl.fields.length+' 완료'));
  topbar.appendChild(topL);
  topbar.appendChild(topR);
  main.appendChild(topbar);

  // Content
  const content = h('div',{className:'content'});

  // Slide header
  const shdr = h('div',{className:'slide-header'});
  shdr.appendChild(h('div',{className:'sh-section'},'P'+state.activeSlide+'. '+sl.section));
  shdr.appendChild(h('div',{className:'sh-title'},sl.title));
  shdr.appendChild(h('div',{className:'sh-subtitle'},sl.subtitle));

  if (sl.dept.length > 0) {
    const dc = deptColor(sl.dept[0]);
    const deptTag = h('div',{className:'sh-dept',style:{background:dc.bg,color:dc.text}});
    deptTag.appendChild(h('span',{style:{width:'6px',height:'6px',borderRadius:'50%',background:dc.dot,display:'inline-block'}}));
    deptTag.appendChild(document.createTextNode('담당: '+sl.dept.join(', ')));
    shdr.appendChild(deptTag);
  }

  if (sl.cover) {
    const cb = h('div',{className:'cover-box'});
    cb.appendChild(h('div',{className:'cover-box-title'},'🧠 뉴냅스 (Nunaps)'));
    cb.appendChild(h('div',{className:'cover-box-text'},'뇌 질환으로 고통받는 이들에게 새로운 희망과 가치를 전하는 디지털 치료제(DTx) 선도 기업'));
    shdr.appendChild(cb);
  }
  content.appendChild(shdr);

  // Dept summary on cover
  if (sl.cover) {
    const ds = getDeptSummary();
    const sumWrap = h('div',{style:{background:'rgba(15,23,42,.55)',borderRadius:'14px',border:'1px solid '+('var(--bd)'),padding:'22px',marginBottom:'20px'}});
    sumWrap.appendChild(h('div',{style:{fontSize:'14px',fontWeight:'600',marginBottom:'14px'}},'📊 부서별 진행 현황'));
    const grid = h('div',{className:'dept-grid'});
    Object.entries(ds).sort((a,b)=>(a[1].filled/a[1].total)-(b[1].filled/b[1].total)).forEach(([dept,info])=>{
      const pct = Math.round(info.filled/info.total*100);
      const dc = deptColor(dept);
      const card = h('div',{className:'dept-card'});
      const top = h('div',{className:'dept-card-top'});
      top.appendChild(h('span',{className:'dept-card-name',style:{color:dc.text}},dept));
      top.appendChild(h('span',{className:'dept-card-count',style:{color:pct===100?'#10B981':undefined}},info.filled+'/'+info.total));
      card.appendChild(top);
      const track = h('div',{className:'progress-track'});
      track.appendChild(h('div',{className:'progress-fill',style:{width:pct+'%',background:pct===100?'#10B981':dc.dot}}));
      card.appendChild(track);
      grid.appendChild(card);
    });
    sumWrap.appendChild(grid);
    content.appendChild(sumWrap);
  }

  // Fields
  if (sl.fields.length === 0 && !sl.cover) {
    content.appendChild(h('div',{style:{textAlign:'center',padding:'40px',color:'#64748B',fontSize:'13px'}},'이 슬라이드에는 별도 입력 항목이 없습니다.'));
  }

  sl.fields.forEach(field => {
    const isFilled = !!state.data[field.key]?.trim();
    const card = h('div',{className:'field-card'+(isFilled?' filled':'')});

    // Header
    const fhdr = h('div',{className:'field-hdr'});
    const fhdrL = h('div',{className:'field-hdr-left'});
    fhdrL.appendChild(h('div',{className:'field-dot',style:{background:isFilled?'#10B981':'#F59E0B'}}));
    fhdrL.appendChild(h('div',{className:'field-label'},field.label));
    fhdr.appendChild(fhdrL);

    if (sl.dept.length > 0) {
      const dc = deptColor(sl.dept[0]);
      fhdr.appendChild(h('div',{className:'field-dept',style:{background:dc.bg,color:dc.text}},sl.dept.join(', ')));
    }
    card.appendChild(fhdr);

    // Input
    const inputWrap = h('div',{className:'field-input'});
    const ta = h('textarea',{
      value: state.data[field.key]||'',
      placeholder: field.placeholder,
      rows: 5,
      onFocus:()=>{card.classList.add('editing')},
      onBlur:()=>{card.classList.remove('editing')},
      onInput:(e)=>{
        state.data[field.key] = e.target.value;
        const dot = card.querySelector('.field-dot');
        if(dot) dot.style.background = e.target.value.trim() ? '#10B981' : '#F59E0B';
        scheduleSave();
      }
    });
    inputWrap.appendChild(ta);
    card.appendChild(inputWrap);
    content.appendChild(card);
  });

  // Nav buttons
  const nav = h('div',{className:'content-nav'});
  nav.appendChild(h('button',{className:'btn-prev',disabled:state.activeSlide===0,onClick:()=>{state.activeSlide--;render()}},'← 이전 슬라이드'));
  nav.appendChild(h('button',{className:'btn-next',disabled:state.activeSlide===SLIDES.length-1,onClick:()=>{state.activeSlide++;render()}},'다음 슬라이드 →'));
  content.appendChild(nav);

  main.appendChild(content);
  return main;
}

// =====================================================
// INIT
// =====================================================
(async function init(){
  render(); // show loading
  await apiLoad();
  render();
})();
</script>
